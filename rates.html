<style id="preloader-style">
  /* === PRELOADER === */
  .nx-preloader {
    position: fixed; inset: 0; z-index: 99999;
    background: #0F0B1E;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px;
    transition: opacity 0.5s, visibility 0.5s;
  }
  .nx-preloader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .nx-preloader-logo {
    width: 72px; height: 72px;
    animation: nx-pulse 1.5s ease-in-out infinite;
  }
  .nx-preloader-bar {
    width: 200px; height: 3px; background: rgba(108,92,231,0.2);
    border-radius: 4px; overflow: hidden;
  }
  .nx-preloader-bar::after {
    content: ''; display: block; height: 100%; width: 40%;
    background: linear-gradient(90deg, #6C5CE7, #06B6D4);
    border-radius: 4px;
    animation: nx-slide 1s ease-in-out infinite;
  }
  @keyframes nx-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.7; }
  }
  @keyframes nx-slide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
</style>
<style id="zfix-global">
  /* Global z-index fix — контент поверх particles canvas */
  header, .header, nav, .navbar, main, .main,
  section, .container, .content, footer, .footer,
  .modal, .overlay, form, button, a, input,
  select, textarea, details, summary {
    position: relative;
    z-index: 2;
  }
  #nxParticles {
    z-index: 0 !important;
    pointer-events: none !important;
  }
  .nx-preloader.hidden {
    pointer-events: none !important;
  }
</style>
    <link rel="canonical" href="https://cryptoflow-muravsky.com/rates">
</head>
<body>
<!-- PRELOADER -->
<div class="nx-preloader" id="nxPreloader">
  <img src="img/favicon.svg" alt="CryptoFlow by Muravsky" class="nx-preloader-logo">
  <div class="nx-preloader-bar"></div>
</div>
<script>
window.addEventListener('load', function() {
  var p = document.getElementById('nxPreloader');
  if (p) { setTimeout(function(){ p.classList.add('hidden'); }, 400); }
});
</script>
  <!-- ========== HEADER ========== -->

  <!-- ========== MOBILE NAV ========== -->

    <main id="main-content" role="main">

  <!-- ===== RATES HERO ===== -->
  <section class="section rates-hero" data-reveal>
    <div class="container">
      <div class="section-header" style="text-align:center;margin-bottom:40px;">
        <h1 class="section-title" data-reveal>Курсы криптовалют</h1>
        <p class="section-subtitle">Актуальные данные в реальном времени по ТОП-50 криптовалют</p>
      </div>

      <!-- Filters -->
      <div class="rates-toolbar">
        <div class="rates-search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="ratesSearch" placeholder="Поиск по названию или тикеру..." autocomplete="off">
        </div>
        <div class="rates-filters">
          <button class="rates-filter-btn active" data-filter="all">Все</button>
          <button class="rates-filter-btn" data-filter="gainers">Растут 🟢</button>
          <button class="rates-filter-btn" data-filter="losers">Падают 🔴</button>
        </div>
      </div>

      <!-- Table -->
      <div class="rates-table-wrap">
        <table class="rates-table">
          <thead>
            <tr>
              <th class="rates-th-rank">#</th>
              <th class="rates-th-name">Монета</th>
              <th class="rates-th-price">Цена</th>
              <th class="rates-th-change">24ч %</th>
              <th class="rates-th-cap">Капитализация</th>
              <th class="rates-th-volume">Объём 24ч</th>
              <th class="rates-th-chart">7д</th>
            </tr>
          </thead>
          <tbody id="ratesTableBody">
            <!-- filled by JS -->
          </tbody>
        </table>
      </div>

      <!-- Loading -->
      <div class="rates-loading" id="ratesLoading" style="display:none;">
        <div class="spinner"></div>
        <span>Загрузка данных...</span>
      </div>
    </div>
  </section>

  <!-- Auth Modal (unified) -->

    </main>

  <script src="js/components.js"></script>
<script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script>
  /* ============================================
     RATES PAGE - CRYPTO TABLE WITH MOCK DATA
     ============================================ */
  (function(){

    var coinsData = [
      {rank:1,  id:'btc',  symbol:'BTC',  name:'Bitcoin',     icon:'₿', cls:'coin-btc',   price:104500,  change:2.14,  cap:2050000000000, volume:42000000000},
      {rank:2,  id:'eth',  symbol:'ETH',  name:'Ethereum',    icon:'Ξ', cls:'coin-eth',   price:3280,    change:-0.82, cap:395000000000,  volume:18500000000},
      {rank:3,  id:'usdt', symbol:'USDT', name:'Tether',      icon:'₮', cls:'coin-usdt',  price:1.00,    change:0.01,  cap:120000000000,  volume:65000000000},
      {rank:4,  id:'bnb',  symbol:'BNB',  name:'BNB',         icon:'B', cls:'coin-bnb',   price:710,     change:1.23,  cap:106000000000,  volume:2100000000},
      {rank:5,  id:'sol',  symbol:'SOL',  name:'Solana',      icon:'S', cls:'coin-sol',   price:178,     change:5.32,  cap:82000000000,   volume:4800000000},
      {rank:6,  id:'xrp',  symbol:'XRP',  name:'Ripple',      icon:'X', cls:'coin-xrp',   price:2.48,    change:3.15,  cap:138000000000,  volume:8900000000},
      {rank:7,  id:'ada',  symbol:'ADA',  name:'Cardano',     icon:'A', cls:'coin-ada',   price:0.82,    change:-1.45, cap:29000000000,   volume:950000000},
      {rank:8,  id:'doge', symbol:'DOGE', name:'Dogecoin',    icon:'D', cls:'coin-doge',  price:0.24,    change:8.72,  cap:35000000000,   volume:3200000000},
      {rank:9,  id:'dot',  symbol:'DOT',  name:'Polkadot',    icon:'●', cls:'coin-dot',   price:8.90,    change:-2.33, cap:12500000000,   volume:580000000},
      {rank:10, id:'matic',symbol:'MATIC',name:'Polygon',     icon:'M', cls:'coin-matic', price:0.58,    change:1.67,  cap:5400000000,    volume:420000000},
      {rank:11, id:'link', symbol:'LINK', name:'Chainlink',   icon:'⬡', cls:'coin-link',  price:18.50,   change:3.71,  cap:11500000000,   volume:890000000},
      {rank:12, id:'avax', symbol:'AVAX', name:'Avalanche',   icon:'A', cls:'coin-avax',  price:42.00,   change:-0.55, cap:17200000000,   volume:720000000},
      {rank:13, id:'uni',  symbol:'UNI',  name:'Uniswap',     icon:'U', cls:'coin-uni',   price:12.40,   change:2.88,  cap:9400000000,    volume:310000000},
      {rank:14, id:'ltc',  symbol:'LTC',  name:'Litecoin',    icon:'Ł', cls:'coin-ltc',   price:115,     change:0.94,  cap:8600000000,    volume:650000000},
      {rank:15, id:'atom', symbol:'ATOM', name:'Cosmos',      icon:'⚛', cls:'coin-atom',  price:11.20,   change:-1.12, cap:4300000000,    volume:280000000},
      {rank:16, id:'xlm',  symbol:'XLM',  name:'Stellar',     icon:'*', cls:'coin-xlm',   price:0.42,    change:4.20,  cap:12800000000,   volume:780000000},
      {rank:17, id:'fil',  symbol:'FIL',  name:'Filecoin',    icon:'F', cls:'coin-fil',   price:6.80,    change:-3.10, cap:3800000000,    volume:240000000},
      {rank:18, id:'trx',  symbol:'TRX',  name:'TRON',        icon:'T', cls:'coin-trx',   price:0.27,    change:1.55,  cap:23500000000,   volume:1100000000},
      {rank:19, id:'near', symbol:'NEAR', name:'NEAR Protocol',icon:'N',cls:'coin-near',  price:5.40,    change:6.12,  cap:6200000000,    volume:450000000},
      {rank:20, id:'apt',  symbol:'APT',  name:'Aptos',       icon:'A', cls:'coin-apt',   price:9.80,    change:-0.73, cap:4700000000,    volume:220000000}
    ];

    var tbody = document.getElementById('ratesTableBody');
    var searchInput = document.getElementById('ratesSearch');
    var filterBtns = document.querySelectorAll('.rates-filter-btn');
    var currentFilter = 'all';

    function formatNum(n) {
      if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
      if (n >= 1e9)  return '$' + (n/1e9).toFixed(2) + 'B';
      if (n >= 1e6)  return '$' + (n/1e6).toFixed(2) + 'M';
      return '$' + n.toLocaleString('en-US');
    }

    function formatPrice(p) {
      if (p >= 1) return '$' + p.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
      return '$' + p.toFixed(4);
    }

    /* Mini sparkline SVG */
    function miniChart(change) {
      var pts = [];
      var val = 50;
      for (var i = 0; i < 14; i++) {
        val += (Math.random() - 0.45) * 8 + (change > 0 ? 0.5 : -0.5);
        val = Math.max(5, Math.min(95, val));
        pts.push((i * 8) + ',' + (100 - val));
      }
      var color = change >= 0 ? '#2ecc71' : '#e74c3c';
      return '<svg width="112" height="40" viewBox="0 0 112 100" class="rates-sparkline">' +
        '<polyline points="' + pts.join(' ') + '" fill="none" stroke="' + color + '" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>' +
        '</svg>';
    }

    function render() {
      var query = (searchInput.value || '').toLowerCase();
      tbody.innerHTML = '';

      var filtered = coinsData.filter(function(c) {
        if (query && c.name.toLowerCase().indexOf(query) === -1 && c.symbol.toLowerCase().indexOf(query) === -1) return false;
        if (currentFilter === 'gainers' && c.change <= 0) return false;
        if (currentFilter === 'losers' && c.change >= 0) return false;
        return true;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:rgba(255,255,255,0.4);">Ничего не найдено</td></tr>';
        return;
      }

      filtered.forEach(function(c, i) {
        var changeClass = c.change >= 0 ? 'positive' : 'negative';
        var changeSign = c.change >= 0 ? '+' : '';
        var tr = document.createElement('tr');
        tr.className = 'rates-row';
        tr.innerHTML =
          '<td class="rates-td-rank">' + c.rank + '</td>' +
          '<td class="rates-td-name">' +
            '<span class="coin-icon ' + c.cls + '">' + c.icon + '</span>' +
            '<div class="rates-coin-info">' +
              '<span class="rates-coin-symbol">' + c.symbol + '</span>' +
              '<span class="rates-coin-name">' + c.name + '</span>' +
            '</div>' +
          '</td>' +
          '<td class="rates-td-price">' + formatPrice(c.price) + '</td>' +
          '<td class="rates-td-change ' + changeClass + '">' + changeSign + c.change.toFixed(2) + '%</td>' +
          '<td class="rates-td-cap">' + formatNum(c.cap) + '</td>' +
          '<td class="rates-td-volume">' + formatNum(c.volume) + '</td>' +
          '<td class="rates-td-chart">' + miniChart(c.change) + '</td>';
        tbody.appendChild(tr);
      });
    }

    /* Search */
    searchInput.addEventListener('input', render);

    /* Filters */
    filterBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        filterBtns.forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter');
        render();
      });
    });

    /* Simulate live updates */
    setInterval(function(){
      coinsData.forEach(function(c){
        var delta = (Math.random() - 0.5) * c.price * 0.002;
        c.price = Math.max(0.001, c.price + delta);
        c.change += (Math.random() - 0.5) * 0.1;
      });
      render();
    }, 5000);

    /* Init render */
    render();

  })();
  </script>
    <script src="js/particles.js"></script>
</body>
</html>
